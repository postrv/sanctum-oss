name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily — triggers kani-full and fuzz-extended

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features

  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2

  test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - run: cargo test --all --all-features
      - run: cargo test --all --all-features -- --ignored

  test-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - run: cargo test --all --all-features
      - run: cargo test --all --all-features -- --ignored

  test-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.0
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - run: cargo check --target x86_64-pc-windows-msvc --all-targets --all-features
      - run: cargo test --all --all-features

  property-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - run: cargo test --all --all-features -- property
        env:
          PROPTEST_CASES: 10000

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.0
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov@0.6.16 --locked
      - name: Generate coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: lcov.info

  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  kani-core:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Strip rust-version (Kani uses its own nightly toolchain)
        run: sed -i 's/^rust-version.*$//' Cargo.toml crates/*/Cargo.toml
      - uses: model-checking/kani-github-action@f838096619a707b0f6b2118cf435eaccfa33e51f # v1
        with:
          args: -p sanctum-budget --default-unwind 10

  kani-full:
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        # Keep this list in sync with #[kani::proof] harnesses. Splitting by
        # harness preserves coverage while avoiding one opaque long-running
        # workspace proof job.
        include:
          - package: sanctum-budget
            harness: ceiling_cost_zero_tokens_are_zero
          - package: sanctum-budget
            harness: ceiling_cost_zero_price_is_zero
          - package: sanctum-budget
            harness: ceiling_cost_u8_inputs_match_exact_ceiling_division
          - package: sanctum-budget
            harness: ceiling_cost_representative_real_prices_are_exact
          - package: sanctum-budget
            harness: ceiling_cost_saturated_inputs_remain_safe
          - package: sanctum-firewall
            harness: shannon_entropy_never_panics
          - package: sanctum-firewall
            harness: glob_matches_exact_match_works
          - package: sanctum-sentinel
            harness: quarantine_state_transitions
          - package: sanctum-sentinel
            harness: validate_id_rejects_traversal
          - package: sanctum-sentinel
            harness: exfiltration_record_bytes_never_panics
          - package: sanctum-sentinel
            harness: pth_analyser_never_panics
          - package: sanctum-sentinel
            harness: pure_path_is_always_benign
          - package: sanctum-sentinel
            harness: exec_is_never_benign
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Strip rust-version (Kani uses its own nightly toolchain)
        run: sed -i 's/^rust-version.*$//' Cargo.toml crates/*/Cargo.toml
      - uses: model-checking/kani-github-action@f838096619a707b0f6b2118cf435eaccfa33e51f # v1
        with:
          args: -p ${{ matrix.package }} --harness ${{ matrix.harness }} --default-unwind 10

  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - run: cargo install cargo-fuzz@0.12.0
      - run: cargo +nightly fuzz run fuzz_pth_analyser -- -max_total_time=30
      - run: cargo +nightly fuzz run fuzz_config_parser -- -max_total_time=30

  fuzz-extended:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - run: cargo install cargo-fuzz@0.12.0
      - run: cargo +nightly fuzz run fuzz_pth_analyser -- -max_total_time=9000
      - run: cargo +nightly fuzz run fuzz_config_parser -- -max_total_time=9000

  reproducible-build:
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.0
      - name: First build
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu
          sha256sum target/x86_64-unknown-linux-gnu/release/sanctum target/x86_64-unknown-linux-gnu/release/sanctum-daemon > /tmp/build1.sha256
      - name: Clean and rebuild
        run: |
          cargo clean
          cargo build --release --target x86_64-unknown-linux-gnu
          sha256sum target/x86_64-unknown-linux-gnu/release/sanctum target/x86_64-unknown-linux-gnu/release/sanctum-daemon > /tmp/build2.sha256
      - name: Verify identical hashes
        run: diff /tmp/build1.sha256 /tmp/build2.sha256

  build-release:
    needs: [lint, deny, test-linux, test-macos, test-windows, property-tests, audit, fuzz, reproducible-build]
    if: ${{ !failure() && !cancelled() }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bin_ext: ''
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            bin_ext: ''
          - target: x86_64-apple-darwin
            os: macos-latest
            bin_ext: ''
          - target: aarch64-apple-darwin
            os: macos-latest
            bin_ext: ''
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin_ext: '.exe'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Install cross (ARM Linux)
        if: matrix.use_cross
        run: cargo install cross --locked
      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}
      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sanctum-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/sanctum${{ matrix.bin_ext }}
            target/${{ matrix.target }}/release/sanctum-daemon${{ matrix.bin_ext }}

  test-installer:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-release]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sanctum-x86_64-unknown-linux-gnu
          path: /tmp/sanctum-release
      - name: Prepare mock release structure
        run: |
          chmod +x /tmp/sanctum-release/sanctum /tmp/sanctum-release/sanctum-daemon
          /tmp/sanctum-release/sanctum --version
          test -x /tmp/sanctum-release/sanctum-daemon

  bench-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - run: cargo bench --workspace --no-run

  loom:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Loom tests (budget)
        run: RUSTFLAGS="--cfg loom" cargo test -p sanctum-budget --test loom_budget_tracker
      - name: Build loom tests (proxy)
        run: cargo rustc -p sanctum-proxy --test loom_pending_cost -- --cfg loom
      - name: Run loom tests (proxy)
        run: target/debug/deps/loom_pending_cost-* --test-threads=1

  # Binary signing is handled by .github/workflows/release.yml (tag-triggered).
  # It uses keyless Sigstore OIDC signing — no COSIGN_KEY secret needed.
