name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily — triggers kani-full and fuzz-extended

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features

  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all --all-features
      - run: cargo test --all --all-features -- --ignored

  test-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all --all-features
      - run: cargo test --all --all-features -- --ignored

  property-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all --all-features -- property
        env:
          PROPTEST_CASES: 10000

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  kani-core:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: model-checking/kani-github-action@v1
      - run: cargo kani --harness quarantine_state_transitions -p sanctum-sentinel
      - run: cargo kani --harness pure_path_is_always_benign -p sanctum-sentinel
      - run: cargo kani --harness validate_id_rejects_traversal -p sanctum-sentinel
      - run: cargo kani --harness ceiling_cost_no_overflow -p sanctum-budget
      - run: cargo kani --harness glob_matches_exact_match_works -p sanctum-firewall

  kani-full:
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: model-checking/kani-github-action@v1
      - run: cargo kani --workspace

  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-fuzz
      - run: cargo fuzz run fuzz_pth_analyser -- -max_total_time=30
      - run: cargo fuzz run fuzz_config_parser -- -max_total_time=30

  fuzz-extended:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-fuzz
      - run: cargo fuzz run fuzz_pth_analyser -- -max_total_time=9000
      - run: cargo fuzz run fuzz_config_parser -- -max_total_time=9000

  reproducible-build:
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
      - name: First build
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu
          sha256sum target/x86_64-unknown-linux-gnu/release/sanctum target/x86_64-unknown-linux-gnu/release/sanctum-daemon > /tmp/build1.sha256
      - name: Clean and rebuild
        run: |
          cargo clean
          cargo build --release --target x86_64-unknown-linux-gnu
          sha256sum target/x86_64-unknown-linux-gnu/release/sanctum target/x86_64-unknown-linux-gnu/release/sanctum-daemon > /tmp/build2.sha256
      - name: Verify identical hashes
        run: diff /tmp/build1.sha256 /tmp/build2.sha256

  build-release:
    needs: [lint, deny, test-linux, test-macos, property-tests, audit, fuzz, kani-core]
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          # aarch64-unknown-linux-gnu removed: cross-compilation requires `cross` or a
          # linker toolchain (gcc-aarch64-linux-gnu). Re-add when cross setup is in place.
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: sanctum-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/sanctum
            target/${{ matrix.target }}/release/sanctum-daemon

  # Binary signing is handled by .github/workflows/release.yml (tag-triggered).
  # It uses keyless Sigstore OIDC signing — no COSIGN_KEY secret needed.
