# cargo-deny configuration
# Run: cargo deny check

[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
notice = "warn"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
]
copyleft = "deny"

[bans]
multiple-versions = "deny"
wildcards = "deny"
allow-wildcard-paths = false

[[bans.deny]]
# No C dependencies in the core library — pure Rust only
name = "openssl-sys"
wrappers = []

[[bans.deny]]
name = "libz-sys"
wrappers = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
