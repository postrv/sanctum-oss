# Forge Configuration
# Code intelligence via narsil-mcp

# ─── Code Intelligence ────────────────────────────────────────────────

[servers.narsil]
command = "narsil-mcp"
args = ["--repos", "."]
transport = "stdio"
timeout_secs = 300          # Large repos need time for full scans
circuit_breaker = true
failure_threshold = 12      # Must exceed max_parallel (8) to survive reconnection cascades
recovery_timeout_secs = 15  # Faster recovery probes after transport death
reconnect = true            # Auto-reconnect on transport death
max_reconnect_backoff_secs = 15

# ─── Sandbox Settings ────────────────────────────────────────────────

[sandbox]
timeout_secs = 300          # Code intelligence workflows can chain multiple tool calls
max_heap_mb = 256           # Analysis returns large results (call graphs, symbol tables)
max_concurrent = 8
max_tool_calls = 200        # Exploration workflows chain many tools
execution_mode = "child_process"
max_resource_size_mb = 7    # Capped at 7MB (IPC limit is 8MB with 1MB overhead)
max_parallel = 8

# ─── Session Stash ────────────────────────────────────────────────────
# Cache scan results and analysis across executions

[sandbox.stash]
max_keys = 512              # More keys for caching per-file and per-symbol results
max_value_size_mb = 32      # Individual analysis results can be large
max_total_size_mb = 256     # Full exploration sessions generate substantial cached data
default_ttl_secs = 7200     # 2 hours — results stay warm across analysis phases
max_ttl_secs = 86400        # 24 hours max

# ─── Server Groups ───────────────────────────────────────────────────

[groups.code-intel]
servers = ["narsil"]
isolation = "open"
